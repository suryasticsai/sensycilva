<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Script Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d11;
            color: #b7e1fa;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1e26;
            border-radius: 24px;
            padding: 32px;
            max-width: 800px;
            width: 100%;
            border: 1px solid #2a2f3a;
            box-shadow: 0 20px 60px rgba(0,0,0,.6);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        h1 span { color: #ff9500; }
        .sub {
            color: #5a7a8a;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .actions button {
            background: #1a3348;
            border: 1px solid #4a8fc0;
            color: #b7e1fa;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: .2s;
            font-family: inherit;
        }
        .actions button:hover { background: #234a66; }
        .actions button:disabled { opacity: 0.5; cursor: not-allowed; }
        .actions button.copy {
            background: #1f2935;
            border-color: #2f3a48;
        }
        .actions button.copy:hover { background: #2a3645; }
        .status {
            font-size: 13px;
            color: #5ac8fa;
            margin-bottom: 12px;
            min-height: 24px;
        }
        .status.error { color: #ff6a5a; }
        .status.success { color: #4cd964; }
        .script-box {
            background: #0a0c10;
            border-radius: 16px;
            padding: 16px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #1a212a;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.7;
            color: #b7e1fa;
            font-family: 'Segoe UI', sans-serif;
        }
        .script-box .empty {
            color: #4a5a6a;
            font-style: italic;
        }
        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: #3a4a5a;
            text-align: center;
        }
        .footer a {
            color: #5ac8fa;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📝 <span>Anime</span> Script Generator</h1>
        <div class="sub">Free AI scripts – no API key, no payments</div>

        <div class="actions">
            <button id="generateBtn">🎙️ Generate Script</button>
            <button id="copyBtn" class="copy" disabled>📋 Copy</button>
        </div>

        <div class="status" id="status">Ready – click "Generate"</div>

        <div class="script-box" id="scriptBox">
            <span class="empty">Click "Generate" to create a new script.</span>
        </div>

        <div class="footer">Powered by <a href="https://puter.com" target="_blank">Puter.js</a> (free Gemini) + offline fallback</div>
    </div>

    <script>
        (function() {
            // ============================================================
            //  COMPLETELY FREE – NO API KEYS, NO PAYMENTS
            //  Uses Puter.js (free Gemini) with offline fallback.
            // ============================================================

            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const scriptBox = document.getElementById('scriptBox');
            const status = document.getElementById('status');

            let currentScript = '';
            let puterLoaded = false;

            // ===== Offline fallback library (10+ full scripts) =====
            const offlineScripts = [
                // (include your 10+ scripts here – I'll show a shortened version for brevity)
                // You can paste the full scripts from the previous answer.
                `[Intro] "Welcome back, anime fans! ..."` // Placeholder – replace with actual scripts
            ];

            // ===== Helper: get a random offline script =====
            function getOfflineScript() {
                return offlineScripts[Math.floor(Math.random() * offlineScripts.length)];
            }

            // ===== Load Puter.js dynamically =====
            function loadPuter() {
                return new Promise((resolve, reject) => {
                    if (typeof puter !== 'undefined') {
                        puterLoaded = true;
                        resolve();
                        return;
                    }
                    const script = document.createElement('script');
                    script.src = 'https://js.puter.com/v2/';
                    script.onload = () => {
                        puterLoaded = true;
                        resolve();
                    };
                    script.onerror = () => reject(new Error('Failed to load Puter.js'));
                    document.head.appendChild(script);
                });
            }

            // ===== Main generate function =====
            async function generate() {
                generateBtn.disabled = true;
                copyBtn.disabled = true;
                status.textContent = '⏳ Generating...';
                status.className = 'status';
                scriptBox.innerHTML = '<span style="color:#5ac8fa;">⏳ Generating...</span>';

                // Try to load Puter.js if not already loaded
                try {
                    await loadPuter();
                    // If Puter loaded, use it
                    const prompt = `Write a complete anime radio show script for "SensyCilva Anime Radio". The script must be at least 500 words. Include: a warm greeting, recent anime news, a featured anime (e.g., Frieren, Spy x Family, Jujutsu Kaisen), a recommendation for another anime, an interesting trivia or fun fact, and a friendly sign-off. Make it energetic and conversational – like a real radio host.`;

                    const response = await puter.ai.chat(prompt, {
                        model: 'google/gemini-2.5-flash',
                    });
                    const text = response.message?.content || response;
                    if (text && text.length > 100) {
                        currentScript = text;
                        scriptBox.textContent = text;
                        status.textContent = `✅ AI script generated (${text.length} characters)`;
                        status.className = 'status success';
                        copyBtn.disabled = false;
                        generateBtn.disabled = false;
                        return;
                    } else {
                        throw new Error('AI response too short');
                    }
                } catch (err) {
                    // Fallback to offline script
                    console.warn('Puter.js failed, using offline fallback:', err.message);
                    const fallback = getOfflineScript();
                    currentScript = fallback;
                    scriptBox.textContent = fallback;
                    status.textContent = '⚠️ Using offline script (AI unavailable)';
                    status.className = 'status error';
                    copyBtn.disabled = false;
                    generateBtn.disabled = false;
                }
            }

            // ===== Copy button =====
            copyBtn.addEventListener('click', () => {
                if (!currentScript) {
                    status.textContent = '⚠️ Nothing to copy. Generate a script first.';
                    status.className = 'status error';
                    return;
                }
                navigator.clipboard.writeText(currentScript).then(() => {
                    status.textContent = '📋 Copied to clipboard!';
                    status.className = 'status success';
                    setTimeout(() => {
                        status.textContent = `✅ Script ready (${currentScript.length} characters)`;
                        status.className = 'status success';
                    }, 2000);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = currentScript;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    status.textContent = '📋 Copied!';
                    status.className = 'status success';
                    setTimeout(() => {
                        status.textContent = `✅ Script ready (${currentScript.length} characters)`;
                        status.className = 'status success';
                    }, 2000);
                });
            });

            // ===== Generate button =====
            generateBtn.addEventListener('click', generate);

            // ===== Auto-generate on load =====
            generate();

            console.log('📝 Anime Script Generator loaded (free, using Puter.js).');
        })();
    </script>

</body>
</html>
