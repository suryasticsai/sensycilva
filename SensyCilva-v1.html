<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎙️ Sansy's Anime Hour – Hinglish RJ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #0b0e1a, #1a1040);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 860px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 32px 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 2px;
        }
        .header h1 {
            color: #f5eaff;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.5px;
        }
        .header .badge {
            background: rgba(167, 139, 250, 0.25);
            color: #c4b5fd;
            padding: 4px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(167, 139, 250, 0.2);
        }
        .sub {
            color: #a89fc8;
            font-size: 0.95rem;
            margin-bottom: 22px;
            border-left: 3px solid #a78bfa;
            padding-left: 16px;
            opacity: 0.85;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .sub span {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #c4b5fd;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 16px;
            margin-bottom: 20px;
        }
        .controls button {
            padding: 12px 28px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s all;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-generate {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(124, 58, 237, 0.55);
        }
        .btn-generate:disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
        }
        .btn-speak {
            background: rgba(255, 255, 255, 0.08);
            color: #e0d9f5;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .btn-speak:hover {
            background: rgba(255, 255, 255, 0.16);
        }
        .btn-speak:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .sliders {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 18px 28px;
            margin: 6px 0 18px 0;
            background: rgba(0, 0, 0, 0.25);
            padding: 12px 20px;
            border-radius: 40px;
        }
        .sliders label {
            color: #cac4e0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .sliders input[type="range"] {
            width: 100px;
            accent-color: #a78bfa;
            background: transparent;
            cursor: pointer;
        }
        .script-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 20px 24px;
            min-height: 320px;
            max-height: 480px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin: 12px 0 18px 0;
            color: #e6defa;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
            font-family: 'Georgia', serif;
        }
        .script-box:empty::before {
            content: "📻 Press 'Generate Spontaneous Script' to start the show...";
            color: #5f5580;
            font-style: italic;
            font-family: 'Segoe UI', sans-serif;
        }
        .script-box::-webkit-scrollbar {
            width: 6px;
        }
        .script-box::-webkit-scrollbar-thumb {
            background: #4a3f6b;
            border-radius: 20px;
        }
        .status {
            text-align: center;
            color: #a89fc8;
            font-size: 0.9rem;
            min-height: 28px;
            margin-top: 4px;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            font-size: 0.7rem;
            color: #4f4670;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 14px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .word-count {
            background: rgba(167, 139, 250, 0.12);
            padding: 2px 16px;
            border-radius: 40px;
            color: #b8aee0;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid #a78bfa;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .warning {
            color: #fbbf24;
            font-size: 0.8rem;
            background: rgba(251, 191, 36, 0.1);
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid rgba(251, 191, 36, 0.15);
        }
        @media (max-width: 550px) {
            .container {
                padding: 20px 16px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .sliders {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .controls button {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>🎙️ Sansy's Anime Hour</h1>
        <span class="badge">🇮🇳 Hinglish RJ · 16</span>
    </div>
    <div class="sub">
        <span>✨ Spontaneous AI · 600+ words · Romanized Hinglish</span>
        <span class="warning">⚡ No hardcoded lines – pure AI every time!</span>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn-generate" id="generateBtn">🔄 Generate Spontaneous Script</button>
        <button class="btn-speak" id="speakBtn" disabled>🔊 Speak in Hinglish</button>
    </div>

    <!-- Sliders -->
    <div class="sliders">
        <label>🐢 Speed <input type="range" id="speedSlider" min="0.7" max="1.6" step="0.05" value="1.15" /> 🐇</label>
        <label>🎵 Pitch <input type="range" id="pitchSlider" min="0.85" max="1.35" step="0.05" value="1.1" /> 🔼</label>
        <span style="color:#6a5f8a; font-size:0.8rem;">(Teen energy = faster + higher pitch)</span>
    </div>

    <!-- Script Display -->
    <div class="script-box" id="scriptDisplay"></div>

    <!-- Status & Word Count -->
    <div class="status" id="statusMsg">💬 Press "Generate" for a brand new Hinglish show!</div>
    <div class="footer">
        <span class="word-count" id="wordCount">📝 0 words</span>
        <span style="color:#3d3557;">🗣️ Voice: Neerja (en-IN) reads Hinglish naturally</span>
    </div>
</div>

<script>
    // ─── DOM Refs ──────────────────────────────────────────────
    const generateBtn = document.getElementById('generateBtn');
    const speakBtn = document.getElementById('speakBtn');
    const scriptDisplay = document.getElementById('scriptDisplay');
    const statusMsg = document.getElementById('statusMsg');
    const wordCount = document.getElementById('wordCount');
    const speedSlider = document.getElementById('speedSlider');
    const pitchSlider = document.getElementById('pitchSlider');

    let currentScript = '';
    let audioCtx = null;

    // ─── AI Script Generation (Pollinations – free, NO hardcoded fallback) ───
    async function generateScript() {
        generateBtn.disabled = true;
        speakBtn.disabled = true;
        scriptDisplay.textContent = '⏳ Sansy is writing in Hinglish... (15–25 seconds)';
        statusMsg.innerHTML = '<span class="spinner"></span> Generating spontaneous script...';

        // ─── Prompt: Forces Romanized Hinglish, 600+ words, no hardcoded lines ───
        const prompt = `
You are Sansy, a 16-year-old Indian female radio jockey. You speak in HINGLISH (Romanized Hindi mixed with English, written in English script). For example: "Namaste doston! Kya haal hai? Aaj hum baat karenge anime ke baare mein!"

Your show is "Sansy's Anime Hour". Write a FRESH, SPONTANEOUS radio script that is AT LEAST 600 WORDS long. Follow this structure:

1. **Intro**: Welcome in Hinglish, introduce yourself, play with sound effects [Music, Applause, Cheers].
2. **Anime News**: Share 2-3 trending anime news (new seasons, movies, manga updates) in Hinglish.
3. **Featured Anime**: Pick ONE popular anime (Demon Slayer, Jujutsu Kaisen, Attack on Titan, One Piece, Spy x Family, etc.) and do a deep dive. Talk about the plot, characters, your favourite moments, and why it's awesome – ALL IN HINGLISH.
4. **Listener Interaction**: Pretend to read messages from fans. Use Indian slang like "yaar", "awesome", "mast", "maza aa gaya", "kya baat hai", "super cool", "boss".
5. **Outro**: Sign off in a fun Hinglish way, tease the next episode, play outro music.

Tone: Super energetic, emotional, dramatic, fun. Use lots of exclamation marks, questions, and sound effect cues like [Dramatic pause], [Laughter], [Music swells].

CRITICAL: Write ONLY the script in Roman script (English letters). No Devanagari. No extra commentary outside the script. Start directly with "🎙️ [Music fades in]...". Make it feel like a real Indian radio show.
        `.trim();

        try {
            const encoded = encodeURIComponent(prompt);
            const url = `https://text.pollinations.ai/prompt/${encoded}`;
            const response = await fetch(url);

            if (!response.ok) throw new Error(`Pollinations API error: ${response.status}`);

            let text = await response.text();
            // Clean up quotes / markdown
            text = text.replace(/^["']|["']$/g, '').replace(/\\n/g, '\n').trim();

            if (!text || text.length < 100) {
                throw new Error('Generated text too short or empty');
            }

            currentScript = text;
            scriptDisplay.textContent = currentScript;
            updateWordCount(currentScript);
            statusMsg.textContent = '✅ Fresh script ready! Press "Speak" to hear Sansy in Hinglish.';
            speakBtn.disabled = false;

        } catch (err) {
            console.error('Generation error:', err);
            // ─── NO HARDCORDED FALLBACK ──────────────────────────
            // We explicitly show the error so the user knows it's truly spontaneous AI.
            scriptDisplay.textContent = `❌ AI generation failed: ${err.message || 'Unknown error'}.\n\nPlease check your internet connection and try again. This proves there is NO hardcoded script – it's always live AI!`;
            statusMsg.textContent = '❌ Failed to generate. Retry!';
            speakBtn.disabled = true;
        } finally {
            generateBtn.disabled = false;
        }
    }

    // ─── Word Counter ──────────────────────────────────────────
    function updateWordCount(text) {
        const words = text.trim().split(/\s+/).filter(w => w.length > 0);
        wordCount.textContent = `📝 ${words.length} words`;
    }

    // ─── TTS – Indian Teen Voice (Neerja) reads Hinglish ──────
    async function speakScript() {
        if (!currentScript || currentScript.length < 20) {
            statusMsg.textContent = '❌ No script! Generate one first.';
            return;
        }

        speakBtn.disabled = true;
        statusMsg.innerHTML = '<span class="spinner"></span> Sansy is speaking Hinglish...';

        const speed = parseFloat(speedSlider.value) || 1.15;
        const pitch = parseFloat(pitchSlider.value) || 1.1;

        try {
            // 1. Edge TTS proxy (Neerja en-IN handles Romanized Hinglish perfectly)
            const url = `https://edge-tts.vercel.app/api/tts?text=${encodeURIComponent(currentScript)}&voice=en-IN-NeerjaNeural`;
            const response = await fetch(url);

            if (!response.ok) throw new Error(`Edge proxy error: ${response.status}`);

            const arrayBuffer = await response.arrayBuffer();

            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.playbackRate.value = speed;
            source.detune.value = (pitch - 1.0) * 100;

            const gain = audioCtx.createGain();
            gain.gain.value = 0.9;
            source.connect(gain);
            gain.connect(audioCtx.destination);

            source.onended = () => {
                statusMsg.textContent = '✅ Show finished! Sansy says: "Accha, phir milte hain!" 🎙️';
                speakBtn.disabled = false;
            };

            source.start(0);

        } catch (err) {
            console.warn('Edge proxy failed, using fallback Web Speech API:', err);

            // 2. Fallback: Browser's built-in TTS (still reads Hinglish with Indian accent)
            try {
                const utterance = new SpeechSynthesisUtterance(currentScript);
                const voices = speechSynthesis.getVoices();
                let indianVoice = voices.find(v => v.lang === 'en-IN' && v.name.includes('Neerja')) ||
                    voices.find(v => v.lang === 'en-IN') ||
                    voices.find(v => v.lang.startsWith('en'));
                if (indianVoice) utterance.voice = indianVoice;
                utterance.rate = Math.min(1.5, Math.max(0.5, speed));
                utterance.pitch = Math.min(1.5, Math.max(0.5, pitch));
                utterance.volume = 1;

                utterance.onstart = () => statusMsg.textContent = '🔊 Sansy speaking (fallback TTS)...';
                utterance.onend = () => {
                    statusMsg.textContent = '✅ Done (fallback).';
                    speakBtn.disabled = false;
                };
                utterance.onerror = () => {
                    statusMsg.textContent = '❌ TTS error – try Chrome or Edge.';
                    speakBtn.disabled = false;
                };

                speechSynthesis.speak(utterance);

                if (!indianVoice && voices.length === 0) {
                    speechSynthesis.onvoiceschanged = () => {
                        const newVoices = speechSynthesis.getVoices();
                        const newIndian = newVoices.find(v => v.lang === 'en-IN');
                        if (newIndian) utterance.voice = newIndian;
                        speechSynthesis.speak(utterance);
                    };
                }
            } catch (fallbackErr) {
                statusMsg.textContent = '❌ No voice available. Use Chrome/Edge.';
                speakBtn.disabled = false;
            }
        }
    }

    // ─── Event Listeners ──────────────────────────────────────
    generateBtn.addEventListener('click', generateScript);
    speakBtn.addEventListener('click', speakScript);

    if ('speechSynthesis' in window) {
        speechSynthesis.getVoices();
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }

    // ─── Initial state ────────────────────────────────────────
    window.addEventListener('load', () => {
        scriptDisplay.textContent = '🎙️ Press "Generate Spontaneous Script" to create a brand new Hinglish anime show. Every time is different – no hardcoded lines! \n\nSansy will talk about anime news, deep dives, and listener messages in full Hinglish.';
        statusMsg.textContent = '💬 Ready! Hit Generate for a fresh AI-written script.';
    });

    console.log('🇮🇳 Sansy Hinglish mode loaded – pure spontaneous AI, zero hardcoding.');
</script>
</body>
</html>
