<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug – Boson TTS</title>
    <!-- (keep your existing styles – same as before) -->
</head>
<body>
    <!-- (keep your existing HTML structure – API key input removed) -->
    <script>
        (function() {
            'use strict';

            // ================================================================
            //  CONFIGURATION – USE YOUR WORKER URL
            // ================================================================
            const WORKER_URL = 'https://sensycilva.suryasticsai.workers.dev';

            // ================================================================
            //  DOM refs (keep your existing refs)
            // ================================================================
            // ... (all your DOM refs remain the same)

            // ================================================================
            //  Debug log helper
            // ================================================================
            function debug(msg) {
                console.log('[DEBUG]', msg);
                // also show in status if you want
                // status.textContent = msg;
            }

            // ================================================================
            //  Play via Worker – with detailed logging
            // ================================================================
            async function playScript() {
                if (!currentCleanText) {
                    status.textContent = '⚠️ No script.';
                    status.className = 'status error';
                    return;
                }
                if (isPlaying) return;

                const voice = voiceSelect.value;
                const emotion = emotionSelect.value;
                const speed = parseFloat(rateSlider.value);

                // Chunk text
                const maxChunkSize = 500;
                const chunks = [];
                let text = currentCleanText;
                while (text.length > 0) {
                    let chunk = text.substring(0, maxChunkSize);
                    let lastPunct = Math.max(chunk.lastIndexOf('.'), chunk.lastIndexOf('!'), chunk.lastIndexOf('?'));
                    if (lastPunct > 50 && lastPunct < maxChunkSize) {
                        chunk = chunk.substring(0, lastPunct + 1);
                    }
                    chunks.push(chunk);
                    text = text.substring(chunk.length).trim();
                }

                debug(`Chunks: ${chunks.length}`);
                status.textContent = `🔊 Speaking ${chunks.length} parts...`;
                status.className = 'status';
                playBtn.disabled = true;
                stopBtn.disabled = false;

                let audioQueue = [];

                for (let i = 0; i < chunks.length; i++) {
                    if (!isPlaying) break;
                    const chunkText = chunks[i];
                    debug(`Requesting chunk ${i+1}/${chunks.length}: "${chunkText.substring(0, 30)}..."`);

                    try {
                        const response = await fetch(WORKER_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                text: chunkText,
                                voice: voice,
                                emotion: emotion,
                                speed: speed,
                            }),
                        });

                        debug(`Response status: ${response.status} ${response.statusText}`);
                        if (!response.ok) {
                            let errorMsg = `HTTP ${response.status}`;
                            try {
                                const errData = await response.json();
                                errorMsg = errData.error || errorMsg;
                            } catch (e) {}
                            throw new Error(errorMsg);
                        }

                        // Check content-type
                        const contentType = response.headers.get('content-type');
                        debug(`Content-Type: ${contentType}`);

                        const blob = await response.blob();
                        debug(`Blob size: ${blob.size} bytes`);
                        if (blob.size === 0) {
                            throw new Error('Empty audio blob');
                        }

                        const url = URL.createObjectURL(blob);
                        const audio = new Audio(url);
                        audioQueue.push(audio);

                    } catch (err) {
                        debug(`❌ Error on chunk ${i+1}: ${err.message}`);
                        status.textContent = `❌ Error: ${err.message}`;
                        status.className = 'status error';
                        playBtn.disabled = false;
                        stopBtn.disabled = true;
                        isPlaying = false;
                        return;
                    }
                }

                debug(`Audio queue built: ${audioQueue.length} files. Playing...`);

                // Play sequentially
                for (let i = 0; i < audioQueue.length; i++) {
                    if (!isPlaying) break;
                    const audio = audioQueue[i];
                    debug(`Playing chunk ${i+1}/${audioQueue.length}`);
                    try {
                        await new Promise((resolve, reject) => {
                            audio.onended = resolve;
                            audio.onerror = (e) => {
                                debug(`Audio error: ${e}`);
                                reject(new Error('Audio playback error'));
                            };
                            audio.play().then(() => {
                                debug(`Chunk ${i+1} started playing`);
                            }).catch(err => {
                                debug(`Play() failed: ${err.message}`);
                                reject(err);
                            });
                        });
                    } catch (err) {
                        debug(`Playback error: ${err.message}`);
                        status.textContent = `❌ Playback error: ${err.message}`;
                        status.className = 'status error';
                        break;
                    }
                    await new Promise(r => setTimeout(r, 300));
                }

                if (isPlaying) {
                    status.textContent = '✅ Playback finished.';
                    status.className = 'status success';
                }
                playBtn.disabled = false;
                stopBtn.disabled = true;
                isPlaying = false;
            }

            // ================================================================
            //  Rest of your code remains the same – generate, stop, copy, etc.
            // ================================================================

        })();
    </script>
</body>
</html>
