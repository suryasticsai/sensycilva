<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Script Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d11;
            color: #b7e1fa;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1e26;
            border-radius: 24px;
            padding: 32px;
            max-width: 800px;
            width: 100%;
            border: 1px solid #2a2f3a;
            box-shadow: 0 20px 60px rgba(0,0,0,.6);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        h1 span { color: #ff9500; }
        .sub {
            color: #5a7a8a;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .actions button {
            background: #1a3348;
            border: 1px solid #4a8fc0;
            color: #b7e1fa;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: .2s;
            font-family: inherit;
        }
        .actions button:hover { background: #234a66; }
        .actions button:disabled { opacity: 0.5; cursor: not-allowed; }
        .actions button.copy {
            background: #1f2935;
            border-color: #2f3a48;
        }
        .actions button.copy:hover { background: #2a3645; }
        .status {
            font-size: 13px;
            color: #5ac8fa;
            margin-bottom: 12px;
            min-height: 24px;
        }
        .status.error { color: #ff6a5a; }
        .status.success { color: #4cd964; }
        .script-box {
            background: #0a0c10;
            border-radius: 16px;
            padding: 16px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #1a212a;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.7;
            color: #b7e1fa;
            font-family: 'Segoe UI', sans-serif;
        }
        .script-box .empty {
            color: #4a5a6a;
            font-style: italic;
        }
        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: #3a4a5a;
            text-align: center;
        }
        .footer a {
            color: #5ac8fa;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📝 <span>Anime</span> Script Generator</h1>
        <div class="sub">Free AI scripts – no API key, no payments</div>

        <div class="actions">
            <button id="generateBtn">🎙️ Generate Script</button>
            <button id="copyBtn" class="copy" disabled>📋 Copy</button>
        </div>

        <div class="status" id="status">Ready – click "Generate"</div>

        <div class="script-box" id="scriptBox">
            <span class="empty">Click "Generate" to create a new script.</span>
        </div>

        <div class="footer">Powered by <a href="https://github.com/andreasbm/jsllm7" target="_blank">jsllm7</a> (free) + offline fallback</div>
    </div>

    <script>
        (function() {
            // ============================================================
            //  COMPLETELY FREE – NO API KEYS, NO PAYMENTS
            //  Uses jsllm7 (free) with offline fallback.
            // ============================================================

            // DOM refs
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const scriptBox = document.getElementById('scriptBox');
            const status = document.getElementById('status');

            let currentScript = '';

            // ===== Offline fallback library (10+ full scripts) =====
            const offlineScripts = [
                // Script 1
                `[Intro]
"Welcome back, anime fans! This is your host, and you're listening to SensyCilva Anime Radio – the only station that brings you the hottest news, deep dives, and all the feels from the world of anime.

[News]
First up, the big announcement everyone's been waiting for: the final season of Attack on Titan has officially wrapped production, and the finale is set to air this fall. Fans are already speculating about the ending – will Eren's plan succeed? Will Mikasa finally get her moment? We'll have to wait and see.

[Recommendation]
If you're looking for something lighter, I highly recommend "The Apothecary Diaries". It's a mystery-comedy set in imperial China, following a clever young woman who solves poisons and puzzles in the palace. The characters are charming, the mysteries are engaging, and the animation is vibrant. It's a refreshing break from action-heavy shows.

[Trivia]
Did you know that the voice actor for Frieren, Atsumi Tanezaki, also voiced Anya in Spy x Family? Her range is incredible – from a stoic elf to a telepathic child. And speaking of Spy x Family, the movie "Code: White" has grossed over $50 million worldwide, making it one of the highest-grossing anime films of the year.

[Sign-off]
That's all for today's broadcast. Thank you for tuning in to SensyCilva Anime Radio. Don't forget to subscribe, share your thoughts, and as always – stay weeb, stay wonderful. See you next time!"`,

                // Script 2
                `[Intro]

                // Script 3
                `[Intro]

                // Script 4
                `[Intro]

                // Script 5
                `[Intro]

                // Script 6
                `[Intro]
"Welcome to SensyCilva Anime Radio, your go-to station for everything anime. I'm your host, and we've got some amazing content lined up for you today."

            ];

            // ===== Helper: get a random offline script =====
            function getOfflineScript() {
                return offlineScripts[Math.floor(Math.random() * offlineScripts.length)];
            }

            // ===== Main generate function =====
            async function generate() {
                generateBtn.disabled = true;
                copyBtn.disabled = true;
                status.textContent = '⏳ Generating...';
                status.className = 'status';
                scriptBox.innerHTML = '<span style="color:#5ac8fa;">⏳ Generating...</span>';

                // Try jsllm7 first (free, no key)
                try {
                    // Load jsllm7 dynamically if not already loaded
                    if (typeof jsllm7 === 'undefined') {
                        await new Promise((resolve, reject) => {
                            const script = document.createElement('script');
                            script.src = 'https://cdn.jsdelivr.net/gh/andreasbm/jsllm7/jsllm7.js';
                            script.onload = resolve;
                            script.onerror = () => reject(new Error('Failed to load jsllm7'));
                            document.head.appendChild(script);
                        });
                    }

                    const prompt = `Write a complete anime radio show script for "SensyCilva Anime Radio". The script must be at least 500 words. Include: a warm greeting, recent anime news, a featured anime (e.g., Frieren, Spy x Family, Jujutsu Kaisen), a recommendation for another anime, an interesting trivia or fun fact, and a friendly sign-off. Make it energetic and conversational – like a real radio host.`;

                    const result = await jsllm7(prompt);
                    if (result && result.length > 100) {
                        currentScript = result;
                        scriptBox.textContent = result;
                        status.textContent = `✅ AI script generated (${result.length} characters)`;
                        status.className = 'status success';
                        copyBtn.disabled = false;
                        generateBtn.disabled = false;
                        return;
                    } else {
                        throw new Error('AI response too short');
                    }
                } catch (err) {
                    // Fallback to offline script
                    console.warn('jsllm7 failed, using offline fallback:', err.message);
                    const fallback = getOfflineScript();
                    currentScript = fallback;
                    scriptBox.textContent = fallback;
                    status.textContent = '⚠️ Using offline script (AI unavailable)';
                    status.className = 'status error';
                    copyBtn.disabled = false;
                    generateBtn.disabled = false;
                    return;
                }
            }

            // ===== Copy button =====
            copyBtn.addEventListener('click', () => {
                if (!currentScript) {
                    status.textContent = '⚠️ Nothing to copy. Generate a script first.';
                    status.className = 'status error';
                    return;
                }
                navigator.clipboard.writeText(currentScript).then(() => {
                    status.textContent = '📋 Copied to clipboard!';
                    status.className = 'status success';
                    setTimeout(() => {
                        status.textContent = `✅ Script ready (${currentScript.length} characters)`;
                        status.className = 'status success';
                    }, 2000);
                }).catch(() => {
                    // Fallback for older browsers
                    const ta = document.createElement('textarea');
                    ta.value = currentScript;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    status.textContent = '📋 Copied!';
                    status.className = 'status success';
                    setTimeout(() => {
                        status.textContent = `✅ Script ready (${currentScript.length} characters)`;
                        status.className = 'status success';
                    }, 2000);
                });
            });

            // ===== Generate button =====
            generateBtn.addEventListener('click', generate);

            // ===== Auto-generate on load =====
            generate();

            console.log('📝 Anime Script Generator loaded (free, no API key).');
        })();
    </script>

</body>
</html>
