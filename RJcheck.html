<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hinglish Script + TTS (Debug)</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0b0d11; color:#b7e1fa; font-family:'Segoe UI',system-ui,sans-serif;
            min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px;
        }
        .container {
            background:#1a1e26; border-radius:24px; padding:32px; max-width:800px; width:100%;
            border:1px solid #2a2f3a; box-shadow:0 20px 60px rgba(0,0,0,.6);
        }
        h1 { font-size:24px; font-weight:700; margin-bottom:4px; }
        h1 span { color:#ff9500; }
        .sub { color:#5a7a8a; font-size:14px; margin-bottom:20px; }
        .actions { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
        .actions button {
            background:#1a3348; border:1px solid #4a8fc0; color:#b7e1fa;
            padding:10px 20px; border-radius:30px; font-weight:600; font-size:14px;
            cursor:pointer; transition:.2s; font-family:inherit;
        }
        .actions button:hover { background:#234a66; }
        .actions button:disabled { opacity:0.5; cursor:not-allowed; }
        .actions button.copy { background:#1f2935; border-color:#2f3a48; }
        .actions button.copy:hover { background:#2a3645; }
        .actions button.play { background:#1a3a2a; border-color:#4cd964; }
        .actions button.play:hover { background:#2a4a3a; }
        .actions button.stop { background:#3a1a1a; border-color:#ff4a3a; }
        .actions button.stop:hover { background:#4a2a2a; }
        .actions button.test { background:#1a2a3a; border-color:#5ac8fa; }
        .actions button.test:hover { background:#2a3a4a; }
        .status { font-size:13px; color:#5ac8fa; margin-bottom:12px; min-height:24px; white-space:pre-wrap; }
        .status.error { color:#ff6a5a; }
        .status.success { color:#4cd964; }
        .script-box {
            background:#0a0c10; border-radius:16px; padding:16px;
            min-height:300px; max-height:500px; overflow-y:auto;
            border:1px solid #1a212a; white-space:pre-wrap;
            font-size:15px; line-height:1.7; color:#b7e1fa;
        }
        .script-box .empty { color:#4a5a6a; font-style:italic; }
        .footer { margin-top:16px; font-size:12px; color:#3a4a5a; text-align:center; }
        .footer a { color:#5ac8fa; text-decoration:none; }
        .log { color:#7a8a9a; font-size:12px; margin-top:8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ <span>Hinglish</span> Anime Script</h1>
    <div class="sub">Debugging TTS – check console for logs</div>

    <div class="actions">
        <button id="generateBtn">📝 Generate Script</button>
        <button id="playBtn" class="play" disabled>🔊 Play</button>
        <button id="stopBtn" class="stop" disabled>⏹ Stop</button>
        <button id="copyBtn" class="copy" disabled>📋 Copy</button>
        <button id="testBtn" class="test">🔊 Test TTS</button>
    </div>

    <div class="status" id="status">Ready – click "Generate"</div>
    <div class="script-box" id="scriptBox"><span class="empty">Click "Generate" to create a new Hinglish script.</span></div>
    <div class="footer">Powered by Puter.js · TTS: browser speech synthesis</div>
    <div id="log" class="log"></div>
</div>

<script>
    (function() {
        // ============================================================
        //  DEBUG VERSION – logs everything to console and status
        // ============================================================

        const generateBtn = document.getElementById('generateBtn');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const copyBtn = document.getElementById('copyBtn');
        const testBtn = document.getElementById('testBtn');
        const scriptBox = document.getElementById('scriptBox');
        const status = document.getElementById('status');
        const logDiv = document.getElementById('log');

        let currentScript = '';
        let currentCleanText = '';
        let utterance = null;
        let speechSynth = window.speechSynthesis;
        let isPlaying = false;
        let debugLog = [];

        function log(msg) {
            debugLog.push(msg);
            console.log('[TTS Debug]', msg);
            logDiv.textContent = debugLog.slice(-5).join('\n');
        }

        // ===== Offline scripts (same as before) =====
        const offlineScripts = [
            `[Intro – energetic, beat drops]
Arre yaar! Kya haal hai, anime lovers? Welcome to SensyCilva Anime Radio – the show jo aapki favourite anime ki duniya mein le jaata hai! Main hoon aapka host, [excited] aur aaj ka episode hai full-on masala! [laughing] Chalo shuru karte hain!

[News – dramatic]
Ohho! Pehli breaking news – Attack on Titan ka finale finally aagaya! [shocked] Eren ne kya kiya? Kya Mikasa ko mila uska moment? [dramatic pause] Humein toh pata hai, par hum nahi bataenge! [laughing] Dekhna padega!

[Featured Anime – Frieren]
Ab baat karte hain Frieren ki – [softly] yaar yeh show hai kamaal ka. Ek elf jo apne human companions ko outlive karti hai – [emotional] aur phir seekhti hai ki life mein choti choti cheezein kitni important hain. [pause] Animation? Wah! Madhouse ne phir se dhamaal kar diya hai! [excited] Agar nahi dekha toh abhi dekhna start karo!

[Recommendation – Mashle]
Aur agar comedy chahiye toh Mashle: Magic and Muscles dekh lo! [laughing] Isme hero magic nahi, sirf muscles aur cream puffs se sab kuch solve karta hai! [shocked] Seriously! Harry Potter meets One Punch Man – but desi style!

[Trivia – fun fact]
[whisper] Suno suno – Sailor Moon ki creator, Naoko Takeuchi, shadi ki hai Hunter x Hunter ke creator Yoshihiro Togashi se! [excited] Wah! Kya power couple hai!

[Sign-off – warm]
Chalo, aaj ke liye itna hi. [yawning] Thoda tired hoon, par aapke pyaar ne energy bhar di! [laughing] Follow karo @SensyCilvaRadio. Aur haan, anime dekhte raho! Bye bye!`,

            `[Intro – energetic]
Arre arre arre! Kya scene hai! Main hoon aapka RJ, aur yeh hai SensyCilva Anime Radio – [shouted] full power! [laughing] Aaj ka show hai super exciting!

[News – fast pace]
Oho! Oshi no Ko season 2 confirm ho gaya! July mein release! [dramatic] Ruby aur Aqua ki kahani aur bhi twisty hogi! [excited] Aur Solo Leveling season 2 bhi aa raha hai – Jinwoo ka comeback, wah!

[Featured Anime – Spy x Family]
Ab baat karte hain Spy x Family ki – [laughing] yeh show hai family entertainment ka best example! Ek spy, ek assassin, aur ek telepathic bacchi – sab ek family! [shocked] Anya ki expressions toh dekho, yaar! [softly] Kya cute hai!

[Recommendation – Horimiya]
Aur agar romance chahiye, toh Horimiya dekho – [warm] real life jaisi love story hai, no drama, bas pyaar aur hasi!

[Trivia]
[whisper] Fun fact – Loid ki voice actor, Takuya Eguchi, ne bhi dekkha hai bahut saare roles! [laughing] Kya baat hai!

[Sign-off]
Okay guys, time to sign off! [yawning] Thoda neend aa rahi hai, par aapke liye kuch bhi! [laughing] Follow karo, share karo, aur haan – anime is life! Bye!`
        ];

        function getOfflineScript() {
            return offlineScripts[Math.floor(Math.random() * offlineScripts.length)];
        }

        // ===== Load Puter.js =====
        let puterLoaded = false;
        function loadPuter() {
            return new Promise((resolve, reject) => {
                if (typeof puter !== 'undefined') {
                    puterLoaded = true;
                    resolve();
                    return;
                }
                const script = document.createElement('script');
                script.src = 'https://js.puter.com/v2/';
                script.onload = () => { puterLoaded = true; resolve(); };
                script.onerror = () => reject(new Error('Failed to load Puter.js'));
                document.head.appendChild(script);
            });
        }

        // ===== Clean script for TTS =====
        function cleanForTTS(text) {
            return text.replace(/\[.*?\]/g, '').replace(/\s+/g, ' ').trim();
        }

        // ===== Get available voices =====
        function getVoices() {
            return speechSynth.getVoices();
        }

        // ===== Test TTS with a short phrase =====
        function testTTS() {
            log('🧪 Testing TTS...');
            const testText = 'Hello, this is a test of the Indian voice.';
            const voices = getVoices();
            log(`Found ${voices.length} voices.`);
            let indianVoice = voices.find(v => v.lang === 'en-IN');
            if (!indianVoice) indianVoice = voices.find(v => v.lang.startsWith('en'));
            if (!indianVoice) indianVoice = voices[0];
            if (indianVoice) {
                log(`Using voice: ${indianVoice.name} (${indianVoice.lang})`);
            } else {
                log('❌ No voice found!');
                status.textContent = '❌ No voice available for TTS.';
                status.className = 'status error';
                return;
            }

            const utterance = new SpeechSynthesisUtterance(testText);
            utterance.voice = indianVoice;
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 1;
            utterance.onstart = () => {
                log('✅ TTS started playing.');
                status.textContent = '🔊 Test TTS playing...';
                status.className = 'status';
            };
            utterance.onend = () => {
                log('✅ TTS finished.');
                status.textContent = '✅ Test TTS finished.';
                status.className = 'status success';
            };
            utterance.onerror = (err) => {
                log('❌ TTS error: ' + (err.error || 'unknown'));
                status.textContent = '❌ Test TTS error.';
                status.className = 'status error';
            };
            speechSynth.speak(utterance);
        }

        // ===== Speak the full script =====
        function speakScript() {
            if (!currentCleanText) {
                status.textContent = '⚠️ No script to play. Generate first.';
                status.className = 'status error';
                return;
            }
            if (isPlaying) {
                log('Already playing, ignoring.');
                return;
            }
            if (speechSynth.speaking) {
                speechSynth.cancel();
            }

            const voices = getVoices();
            let indianVoice = voices.find(v => v.lang === 'en-IN');
            if (!indianVoice) indianVoice = voices.find(v => v.lang.startsWith('en'));
            if (!indianVoice) indianVoice = voices[0];
            if (!indianVoice) {
                log('❌ No voice available.');
                status.textContent = '❌ No voice available.';
                status.className = 'status error';
                return;
            }
            log(`Using voice: ${indianVoice.name} (${indianVoice.lang})`);

            // Split into sentences
            const sentences = currentCleanText.split(/(?<=[.!?])\s+|\n/).filter(s => s.trim().length > 0);
            log(`Speaking ${sentences.length} sentences.`);

            let index = 0;
            isPlaying = true;
            playBtn.disabled = true;
            stopBtn.disabled = false;
            status.textContent = '🔊 Speaking...';
            status.className = 'status';

            function speakNext() {
                if (!isPlaying) {
                    log('Stopped by user.');
                    status.textContent = '⏹ Stopped.';
                    status.className = 'status';
                    playBtn.disabled = false;
                    stopBtn.disabled = true;
                    return;
                }
                if (index >= sentences.length) {
                    log('✅ All sentences spoken.');
                    status.textContent = '✅ Playback finished.';
                    status.className = 'status success';
                    playBtn.disabled = false;
                    stopBtn.disabled = true;
                    isPlaying = false;
                    return;
                }
                const text = sentences[index];
                log(`Speaking sentence ${index+1}: ${text.substring(0, 30)}...`);
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.voice = indianVoice;
                utterance.rate = 0.9;
                utterance.pitch = 1.0;
                utterance.volume = 1;
                utterance.onend = () => {
                    index++;
                    speakNext();
                };
                utterance.onerror = (err) => {
                    log(`❌ Error on sentence ${index+1}: ${err.error || 'unknown'}`);
                    // Skip this sentence and continue
                    index++;
                    speakNext();
                };
                speechSynth.speak(utterance);
            }

            speakNext();
        }

        // ===== Stop =====
        function stopTTS() {
            if (speechSynth.speaking) {
                speechSynth.cancel();
            }
            isPlaying = false;
            log('Stopped by user.');
            status.textContent = '⏹ Stopped.';
            status.className = 'status';
            playBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // ===== Generate =====
        async function generate() {
            generateBtn.disabled = true;
            playBtn.disabled = true;
            stopBtn.disabled = true;
            copyBtn.disabled = true;
            status.textContent = '⏳ Generating Hinglish script...';
            status.className = 'status';
            scriptBox.innerHTML = '<span style="color:#5ac8fa;">⏳ Generating...</span>';

            const prompt = `Write a complete anime radio show script in Hinglish (mix of Hindi and English) for "SensyCilva Anime Radio". The host is super energetic, uses lots of expressions like [shocked], [laughing], [dramatic pause], [excited], [softly], [whisper], [yawning], and interjections like "arre yaar", "ohho", "wah", "uhh", "hmm". Make it sound very realistic and human. Include: a greeting, news, featured anime (like Frieren, Spy x Family), recommendation, trivia, sign-off. At least 400 words.`;

            try {
                await loadPuter();
                const response = await puter.ai.chat(prompt, {
                    model: 'google/gemini-2.5-flash',
                });
                let text = response.message?.content || response;
                if (text && text.length > 100) {
                    currentScript = text;
                    currentCleanText = cleanForTTS(text);
                    scriptBox.textContent = text;
                    status.textContent = `✅ Script generated (${text.length} characters)`;
                    status.className = 'status success';
                    playBtn.disabled = false;
                    copyBtn.disabled = false;
                    generateBtn.disabled = false;
                    log('✅ Script generated.');
                    return;
                } else {
                    throw new Error('Response too short');
                }
            } catch (err) {
                console.warn('Puter failed, using offline fallback:', err.message);
                const fallback = getOfflineScript();
                currentScript = fallback;
                currentCleanText = cleanForTTS(fallback);
                scriptBox.textContent = fallback;
                status.textContent = '⚠️ Using offline script (AI unavailable)';
                status.className = 'status error';
                playBtn.disabled = false;
                copyBtn.disabled = false;
                generateBtn.disabled = false;
                log('⚠️ Using offline fallback.');
            }
        }

        // ===== Copy =====
        function copyScript() {
            if (!currentScript) {
                status.textContent = '⚠️ Nothing to copy. Generate first.';
                status.className = 'status error';
                return;
            }
            navigator.clipboard.writeText(currentScript).then(() => {
                status.textContent = '📋 Copied!';
                status.className = 'status success';
                setTimeout(() => status.textContent = `✅ Script ready (${currentScript.length} chars)`, 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = currentScript;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                status.textContent = '📋 Copied!';
                status.className = 'status success';
            });
        }

        // ===== Event listeners =====
        generateBtn.addEventListener('click', generate);
        playBtn.addEventListener('click', speakScript);
        stopBtn.addEventListener('click', stopTTS);
        copyBtn.addEventListener('click', copyScript);
        testBtn.addEventListener('click', testTTS);

        // Preload voices and log them
        if (speechSynth) {
            speechSynth.getVoices();
            speechSynth.onvoiceschanged = () => {
                const voices = speechSynth.getVoices();
                log(`Voices loaded: ${voices.length} total.`);
                const indian = voices.find(v => v.lang === 'en-IN');
                if (indian) log(`Found Indian voice: ${indian.name}`);
                else log('No en-IN voice found – using fallback.');
            };
        }

        // Auto-generate on load
        generate();

        console.log('🎙️ Debug version loaded – check console and logs.');
    })();
</script>
</body>
</html>
